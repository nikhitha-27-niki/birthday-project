<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Love Form 💙</title>

<style>
body{
  margin:0;
  height:100vh;
  background:url('/brd1.jpg') no-repeat center center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Segoe UI;
  animation:fadeIn 1.5s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

form{
  background:rgba(0,0,0,0.6);
  padding:40px;
  border-radius:20px;
  text-align:center;
  color:white;
}

input{
  display:block;
  margin:15px auto;
  padding:10px;
  width:250px;
  border:none;
  border-radius:10px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<form action="/wish" method="post">
<h2>Love Form 💙</h2>

<p style="color:red;" th:text="${error}"></p>

<input type="text" name="username"
placeholder="Enter your special person nickname" required>

<input type="password" name="password"
placeholder="Enter your 4 digit special code" required>

<button type="submit">Submit 💌</button>

</form>

</body>
</html>
