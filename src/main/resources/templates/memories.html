<!DOCTYPE html>
<html>
<head>
<title>Our Memories 💙</title>

<style>
body{
  margin:0;
  height:100vh;
  background:url('/bg3.jpg') no-repeat center center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Segoe UI;
  color:white;
  position:relative;
}

/* Dark overlay */
body::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:0;
}

h1{
  position:relative;
  z-index:1;
}

.gallery{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns: repeat(3, 220px);
  gap:25px;
  margin-top:30px;
}

.gallery img{
  width:220px;
  height:220px;
  border-radius:20px;
  object-fit:cover;
  opacity:0;
  transform:scale(0.8);
  animation: fadeZoom 1s forwards;
}

/* Delay each image */
.gallery img:nth-child(1){ animation-delay:0.2s;}
.gallery img:nth-child(2){ animation-delay:0.4s;}
.gallery img:nth-child(3){ animation-delay:0.6s;}
.gallery img:nth-child(4){ animation-delay:0.8s;}
.gallery img:nth-child(5){ animation-delay:1s;}
.gallery img:nth-child(6){ animation-delay:1.2s;}

@keyframes fadeZoom{
  to{
    opacity:1;
    transform:scale(1);
  }
}

button{
  position:relative;
  z-index:1;
  margin-top:30px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
}

#endingScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  opacity:0;
  visibility:hidden;
  transition:1.2s ease;
  z-index:9999;   /* VERY IMPORTANT */
}

#endingScreen.show{
  opacity:1;
  visibility:visible;
}

#endingText{
  font-size:28px;
  margin-bottom:20px;
}

#subText{
  font-size:18px;
  width:60%;
  line-height:1.6;
}

</style>
</head>

<body>

<h1>Our Beautiful Memories 💙</h1>


<button onclick="showEnding()">Don't remove me from your heart 💙</button>

<div class="gallery">
  <img src="/photo1.jpeg">
  <img src="/photo2.jpeg">
  <img src="/photo3.jpeg">
  <img src="/photo4.jpeg">
  <img src="/photo6.jpeg">
  <img src="/photo7.jpeg">
</div>

<div id="endingScreen">
    <h1 id="endingText"></h1>
    <p id="subText"></p>
    <button onclick="goLogin()">Close 💙</button>
</div>

<script>
function showEnding(){
    document.querySelector(".gallery").style.display="none";
    document.querySelector("h1").style.display="none";

    document.getElementById("endingScreen").classList.add("show");
    typeFinalMessage();
}
var finalText = "Even if this page closes…\nI hope we never close our chapter.";

var subMessage = "No matter where life takes us,\njust remember — you will always have someone who silently chooses you every single day 💙";

var i = 0;
function typeFinalMessage(){
    if(i < finalText.length){
        document.getElementById("endingText").innerHTML += finalText.charAt(i);
        i++;
        setTimeout(typeFinalMessage, 50);
    } else {
        document.getElementById("subText").innerText = subMessage;
    }
}

function goLogin(){
    window.location.href="/logout";
}
</script>



</body>
</html>
